name: Android CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Load signing env by gh + GH_TOKEN_class_viewer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_class_viewer }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "缺少 secret: GH_TOKEN_class_viewer" >&2
            exit 1
          fi
          KEYSTORE_B64="$(gh variable get CLASS_VIEWER_KEYSTORE_BASE64 --repo "${{ github.repository }}")"
          KEYSTORE_PASSWORD="$(gh variable get CLASS_VIEWER_KEYSTORE_PASSWORD --repo "${{ github.repository }}")"
          KEY_ALIAS="$(gh variable get CLASS_VIEWER_KEY_ALIAS --repo "${{ github.repository }}")"
          KEY_PASSWORD="$(gh variable get CLASS_VIEWER_KEY_PASSWORD --repo "${{ github.repository }}")"
          KEYSTORE_PATH="$RUNNER_TEMP/class-viewer.jks"
          echo "$KEYSTORE_B64" | base64 --decode > "$KEYSTORE_PATH"
          {
            echo "CLASS_VIEWER_KEYSTORE_FILE=$KEYSTORE_PATH"
            echo "CLASS_VIEWER_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "CLASS_VIEWER_KEY_ALIAS=$KEY_ALIAS"
            echo "CLASS_VIEWER_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Unit tests
        run: ./gradlew :core-kernel:testDebugUnitTest

      - name: Build debug
        run: ./gradlew assembleDebug

  cd:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Load signing env by gh + GH_TOKEN_class_viewer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_class_viewer }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "缺少 secret: GH_TOKEN_class_viewer" >&2
            exit 1
          fi
          KEYSTORE_B64="$(gh variable get CLASS_VIEWER_KEYSTORE_BASE64 --repo "${{ github.repository }}")"
          KEYSTORE_PASSWORD="$(gh variable get CLASS_VIEWER_KEYSTORE_PASSWORD --repo "${{ github.repository }}")"
          KEY_ALIAS="$(gh variable get CLASS_VIEWER_KEY_ALIAS --repo "${{ github.repository }}")"
          KEY_PASSWORD="$(gh variable get CLASS_VIEWER_KEY_PASSWORD --repo "${{ github.repository }}")"
          KEYSTORE_PATH="$RUNNER_TEMP/class-viewer.jks"
          echo "$KEYSTORE_B64" | base64 --decode > "$KEYSTORE_PATH"
          {
            echo "CLASS_VIEWER_KEYSTORE_FILE=$KEYSTORE_PATH"
            echo "CLASS_VIEWER_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "CLASS_VIEWER_KEY_ALIAS=$KEY_ALIAS"
            echo "CLASS_VIEWER_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build release (v7a/v8a/universal)
        run: ./gradlew assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
