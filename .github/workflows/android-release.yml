name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Load signing env
        shell: pwsh
        env:
          CLASS_VIEWER_KEYSTORE_BASE64: ${{ secrets.CLASS_VIEWER_KEYSTORE_BASE64 }}
          CLASS_VIEWER_KEYSTORE_PASSWORD: ${{ secrets.CLASS_VIEWER_KEYSTORE_PASSWORD }}
          CLASS_VIEWER_KEY_ALIAS: ${{ secrets.CLASS_VIEWER_KEY_ALIAS }}
          CLASS_VIEWER_KEY_PASSWORD: ${{ secrets.CLASS_VIEWER_KEY_PASSWORD }}
        run: ./scripts/load-signing-env.ps1 -OutputDir $env:RUNNER_TEMP

      - name: Configure release ABI splits
        shell: pwsh
        run: |
          $buildFile = "app/build.gradle.kts"
          $content = Get-Content -Raw -LiteralPath $buildFile
          $current = 'include("armeabi-v7a", "arm64-v8a")'
          $target = 'include("armeabi-v7a", "arm64-v8a", "x86", "x86_64")'
          if (-not $content.Contains($current)) {
            throw "Expected ABI split declaration was not found."
          }
          $content.Replace($current, $target) | Set-Content -NoNewline -LiteralPath $buildFile

      - name: Build release (4 ABIs + universal)
        run: ./gradlew assembleRelease

      - name: Rename release APKs
        shell: pwsh
        run: |
          $releaseDir = "app/build/outputs/apk/release"
          $targets = @(
            @{ Abi = "armeabi-v7a"; Regex = "(^|-)armeabi-v7a(-|$)" },
            @{ Abi = "arm64-v8a"; Regex = "(^|-)arm64-v8a(-|$)" },
            @{ Abi = "x86"; Regex = "(^|-)x86(-|$)" },
            @{ Abi = "x86_64"; Regex = "(^|-)x86_64(-|$)" },
            @{ Abi = "universal"; Regex = "(^|-)universal(-|$)" }
          )

          foreach ($target in $targets) {
            $matches = @(Get-ChildItem -LiteralPath $releaseDir -Filter "*.apk" | Where-Object { $_.BaseName -match $target.Regex })
            if ($matches.Count -ne 1) {
              throw "Expected exactly one APK for $($target.Abi), found $($matches.Count)."
            }

            Move-Item -LiteralPath $matches[0].FullName -Destination (Join-Path $releaseDir "ClassScheduleViewer-$($target.Abi).apk") -Force
          }

      - name: Generate update manifest
        shell: pwsh
        run: |
          $releaseDir = "app/build/outputs/apk/release"
          $buildFile = "app/build.gradle.kts"
          $buildText = Get-Content -Raw -LiteralPath $buildFile
          if ($buildText -notmatch "versionCode\s*=\s*(\d+)") {
            throw "versionCode was not found."
          }
          $versionCode = [int]$Matches[1]
          if ($buildText -notmatch "versionName\s*=\s*`"([^`"]+)`"") {
            throw "versionName was not found."
          }
          $versionName = $Matches[1]
          $tagName = $env:GITHUB_REF_NAME
          $repo = $env:GITHUB_REPOSITORY
          $assets = @(Get-ChildItem -LiteralPath $releaseDir -Filter "ClassScheduleViewer-*.apk" | Sort-Object Name | ForEach-Object {
            $fileName = $_.Name
            $abi = $fileName -replace "^ClassScheduleViewer-", "" -replace "\.apk$", ""
            [ordered]@{
              abi = $abi
              fileName = $fileName
              sha256 = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              downloadUrl = "https://github.com/$repo/releases/download/$tagName/$fileName"
            }
          })
          $manifest = [ordered]@{
            schemaVersion = 1
            versionCode = $versionCode
            versionName = $versionName
            tagName = $tagName
            assets = $assets
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath (Join-Path $releaseDir "update.json") -Encoding utf8

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/ClassScheduleViewer-*.apk
            app/build/outputs/apk/release/update.json
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/ClassScheduleViewer-*.apk
            app/build/outputs/apk/release/update.json
          generate_release_notes: true
